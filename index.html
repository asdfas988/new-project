<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>个人书库 - 修复版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fef9f3; --text: #5a4a42; --accent: #ff9a8b; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; border: 2px solid #5a4a42; box-shadow: 6px 6px 0px #d4b8a7; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .note-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-family: inherit; }
        
        /* 书籍展示 */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .book-item { background: white; border: 1px solid #e0c9b8; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .book-item:hover { transform: translateY(-5px); border-color: var(--accent); }
        .book-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #eee; border-bottom: 1px solid #eee; }
        .book-body { padding: 10px; }
        .book-title { font-weight: bold; font-size: 0.95em; height: 2.6em; overflow: hidden; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
        .modal-box { background:white; padding:30px; border-radius:20px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto; position:relative; }
        .close { position:absolute; top:15px; right:20px; cursor:pointer; font-size:1.5em; }
        .debug-info { font-size: 12px; color: #999; margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="!isLoggedIn" style="max-width:400px; margin: 100px auto;" class="card">
            <h2 style="text-align:center">登录系统</h2>
            <input v-model="email" placeholder="邮箱" class="note-input">
            <input v-model="password" type="password" placeholder="密码" class="note-input" @keyup.enter="login">
            <button class="btn" style="width:100%" @click="login">进入空间</button>
            <p v-if="msg" style="color:red; font-size:14px; margin-top:10px">{{ msg }}</p>
        </div>

        <div v-else class="container">
            <div class="header">
                <h1>📚 我的私人书库</h1>
                <div>
                    <button class="btn" @click="showAdd = true">+ 新增书籍</button>
                    <button class="btn" style="background:#4ecdc4; margin-left:10px" @click="loadData">刷新</button>
                    <button class="btn" style="background:#999; margin-left:10px" @click="logout">退出</button>
                </div>
            </div>

            <!-- 调试统计 -->
            <div class="debug-info">
                📊 数据库总记录：{{ rawCount }} 条 | 页面成功渲染：{{ books.length }} 条
                <span v-if="rawCount > books.length" style="color:red"> (有 {{rawCount - books.length}} 条记录因 ID 重复或格式错误未显示)</span>
            </div>

            <!-- 添加书籍表单 -->
            <div v-if="showAdd" class="card" style="border-style:dashed; margin-top:20px">
                <h3>收录新书</h3>
                <input v-model="newBook.title" placeholder="书名 (必填)" class="note-input">
                <input v-model="newBook.author" placeholder="作者" class="note-input">
                <input v-model="newBook.cover" placeholder="图片链接" class="note-input">
                <textarea v-model="newBook.content" placeholder="笔记内容" class="note-input" style="height:100px"></textarea>
                <button class="btn" @click="saveBook">💾 确认收录</button>
                <button @click="showAdd = false" style="background:none; border:none; margin-left:10px; cursor:pointer">取消</button>
            </div>

            <div class="book-grid" style="margin-top:20px">
                <div v-for="book in books" :key="book.id" class="book-item" @click="viewing = book">
                    <img :src="book.cover || 'https://via.placeholder.com/150x200?text=No+Cover'" class="book-cover">
                    <div class="book-body">
                        <div class="book-title">{{ book.title }}</div>
                        <div style="font-size:0.8em; color:#888">{{ book.author }}</div>
                    </div>
                </div>
            </div>

            <!-- 书籍详情弹窗 -->
            <div v-if="viewing" class="modal" @click.self="viewing = null">
                <div class="modal-box">
                    <span class="close" @click="viewing = null">&times;</span>
                    <div style="display:flex; gap:20px; margin-bottom:20px">
                        <img :src="viewing.cover" style="width:120px; border-radius:8px">
                        <div>
                            <h2>{{ viewing.title }}</h2>
                            <p>作者：{{ viewing.author }}</p>
                            <p style="font-size:12px; color:#999; margin-top:10px">收录于：{{ formatDate(viewing.createdAt) }}</p>
                        </div>
                    </div>
                    <div style="border-top:1px solid #eee; padding-top:20px">
                        <h4>📝 阅读笔记</h4>
                        <div style="line-height:1.6; color:#444" v-html="renderMarkdown(viewing.content)"></div>
                    </div>
                    <button class="btn" style="background:#ff6b6b; margin-top:30px" @click="deleteBook(viewing.id)">🗑️ 删除此书</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        const SB_URL = 'https://zqmgigcnruvvdcholbuj.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbWdpZ2NucnV2dmRjaG9sYnVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU4NjgzNjEsImV4cCI6MjA4MTQ0NDM2MX0.IHzDp7o5M9QM8IBWy2ri5gS9h9nm0zk3AaPTNveDqXI';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        createApp({
            data() {
                return {
                    isLoggedIn: false, email: '', password: '', userId: null, msg: '',
                    books: [], rawCount: 0,
                    showAdd: false, viewing: null,
                    newBook: { title: '', author: '', cover: '', content: '' }
                }
            },
            methods: {
                async login() {
                    this.msg = '';
                    const { data, error } = await sb.auth.signInWithPassword({ email: this.email, password: this.password });
                    if (error) return this.msg = "登录失败: " + error.message;
                    this.userId = data.user.id;
                    this.isLoggedIn = true;
                    this.loadData();
                },
                
                async loadData() {
                    const { data, error } = await sb.from('books').select('*').eq('user_id', this.userId);
                    if (error) return console.error(error);
                    
                    this.rawCount = data.length;
                    
                    // 核心修复：更鲁棒的数据映射逻辑
                    const processed = data.map(row => {
                        const bookData = row.data || {};
                        // 1. 如果 JSON 内部没 ID，使用数据库行的自增 ID
                        // 2. 确保 ID 是字符串，防止去重逻辑出错
                        return {
                            ...bookData,
                            id: bookData.id ? String(bookData.id) : `db-row-${row.id}`,
                            createdAt: bookData.createdAt || row.created_at
                        };
                    });

                    // 使用 Map 进行去重，确保每个 ID 只有一条数据，且不会因为 ID 为 null 导致全军覆没
                    const uniqueMap = new Map();
                    processed.forEach(b => {
                        if (b.title) uniqueMap.set(b.id, b);
                    });
                    
                    this.books = Array.from(uniqueMap.values()).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                    console.log("加载成功，当前书库：", this.books);
                },

                async saveBook() {
                    if (!this.newBook.title) return alert("书名不能为空");
                    
                    // 核心修复：保存前强制生成唯一 ID 和时间戳
                    const bookToSave = {
                        ...this.newBook,
                        id: 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        createdAt: new Date().toISOString()
                    };

                    const { error } = await sb.from('books').insert({
                        user_id: this.userId,
                        data: bookToSave
                    });

                    if (error) {
                        alert("收录失败: " + error.message);
                    } else {
                        alert("🎉 收录成功！");
                        this.showAdd = false;
                        this.newBook = { title: '', author: '', cover: '', content: '' };
                        this.loadData(); // 立即重新加载
                    }
                },

                async deleteBook(id) {
                    if (!confirm("确定要删除这本书吗？")) return;
                    // 通过 data 内部的 id 字段进行匹配删除
                    const { error } = await sb.from('books').delete().eq('user_id', this.userId).filter('data->>id', 'eq', id);
                    if (error) alert("删除失败");
                    else {
                        this.viewing = null;
                        this.loadData();
                    }
                },

                formatDate(date) { return date ? new Date(date).toLocaleString() : '未知'; },
                renderMarkdown(text) { return text ? marked.parse(text) : '暂无笔记内容'; },
                logout() { sb.auth.signOut(); location.reload(); }
            },
            mounted() {
                // 检查是否已登录
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) {
                        this.userId = session.user.id;
                        this.isLoggedIn = true;
                        this.loadData();
                    }
                });
            }
        }).mount('#app');
    </script>
</body>
</html>
